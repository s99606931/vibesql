name: CI/CD

on:
  push:
    branches: [main, stg]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  # ── 1. Test ─────────────────────────────────────────────────────────────────
  test:
    name: Type Check & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Stub Next.js route types for CI
        run: mkdir -p .next/types && echo 'export {}' > .next/types/routes.d.ts

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run

  # ── 2. Deploy (main only, after test passes) ─────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        id: deploy
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_SERVICE_NAME }}" \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
